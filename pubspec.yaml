name: crops_disease
description: Rice Disease Detection App using CNN-GAT
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.0
  # UI & icons
  cupertino_icons: ^1.0.6
   

  # Camera plugin (for real camera access)
  camera: ^0.10.5+9

  # HTTP (send image to Python backend)
  http: ^1.2.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/diseases/
    - assets/images/insects/


